<!--
  Cognio Public Driver Library
  ----------------------------
  A single, dependency-free page that lists every released Cognio device
  driver. It fetches ./index.json (regenerated by the release pipeline in the
  private cognio-drivers repo) and renders a filterable catalog with download
  links. No build step, no frameworks, no external requests — safe to serve
  straight from GitHub Pages.
-->
<title>Cognio Driver Library</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Browse and download Cognio device drivers.">
<style>
  :root {
    --bg: #f4f6f8;
    --panel: #ffffff;
    --ink: #1c2733;
    --muted: #61707e;
    --line: #dfe5ea;
    --accent: #0a66c2;
    --accent-ink: #ffffff;
    --chip: #eef2f6;
    --shadow: 0 1px 3px rgba(18, 38, 58, .08), 0 1px 2px rgba(18, 38, 58, .06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.5;
  }
  a { color: var(--accent); }

  header.site {
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    padding: 22px 28px;
  }
  header.site h1 { margin: 0; font-size: 22px; letter-spacing: .2px; }
  header.site p { margin: 4px 0 0; color: var(--muted); font-size: 14px; }

  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 24px;
    max-width: 1180px;
    margin: 0 auto;
    padding: 24px 28px 60px;
  }

  /* ---- Sidebar / filters ---- */
  aside { position: sticky; top: 24px; align-self: start; }
  .search {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    margin-bottom: 18px;
  }
  .search:focus { outline: 2px solid var(--accent); border-color: var(--accent); }

  .filter-group {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .filter-group h2 {
    margin: 0;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: #fff;
    background: #2b3947;
    padding: 10px 14px;
  }
  .filter-list { max-height: 260px; overflow-y: auto; padding: 8px 6px; }
  .filter-list label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  .filter-list label:hover { background: var(--chip); }
  .filter-list input { accent-color: var(--accent); width: 15px; height: 15px; }
  .filter-list .count { margin-left: auto; color: var(--muted); font-size: 12px; }
  .clear-all {
    background: none; border: none; color: var(--accent);
    font-size: 13px; cursor: pointer; padding: 4px 2px; margin-bottom: 12px;
  }
  .clear-all:hover { text-decoration: underline; }

  /* ---- Results ---- */
  .results-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 14px;
  }
  .results-head .count { color: var(--muted); font-size: 14px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 6px 18px;
  }
  .card .title { grid-column: 1; margin: 0; font-size: 18px; }
  .card .brand { grid-column: 1; color: var(--muted); font-size: 13px; margin: 0 0 6px; }
  .card .desc { grid-column: 1; margin: 6px 0 0; font-size: 14px; }
  .card .others { grid-column: 1; margin: 8px 0 0; font-size: 13px; color: var(--muted); }
  .badges { grid-column: 1; display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .badge {
    font-size: 12px; padding: 2px 9px; border-radius: 999px;
    background: var(--chip); color: #33475b; white-space: nowrap;
  }
  .badge.cat { background: #e4eefb; color: #0a4f9c; }
  .badge.ver { background: #eef2f6; color: #33475b; }
  .badge.tested-hardware { background: #e2f3e8; color: #1c6b3a; }
  .badge.tested-3rd { background: #fdefdc; color: #8a5a12; }
  .badge.tested-untested { background: #eef1f4; color: #61707e; }

  .dl {
    grid-column: 2; grid-row: 1 / span 2; align-self: center;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--accent); color: var(--accent-ink);
    text-decoration: none; font-weight: 600; font-size: 14px;
    padding: 10px 18px; border-radius: 8px; white-space: nowrap;
  }
  .dl:hover { background: #08528f; }

  .empty, .error {
    background: var(--panel); border: 1px dashed var(--line);
    border-radius: 12px; padding: 40px 24px; text-align: center; color: var(--muted);
  }
  .error { border-color: #e4b4b4; color: #9c3a3a; }

  footer.site { text-align: center; color: var(--muted); font-size: 13px; padding: 0 0 40px; }

  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
    aside { position: static; }
    .card { grid-template-columns: 1fr; }
    .dl { grid-column: 1; grid-row: auto; justify-self: start; margin-top: 10px; }
  }
</style>

<header class="site">
  <h1>Cognio Driver Library</h1>
  <p>Browse and download managed device drivers for Cognio-powered systems.</p>
</header>

<div class="layout">
  <aside>
    <input id="search" class="search" type="search" placeholder="Search drivers…" aria-label="Search drivers">
    <button id="clearAll" class="clear-all" hidden>Clear all filters</button>
    <div id="filters"></div>
  </aside>

  <main>
    <div class="results-head">
      <div class="count" id="count"></div>
    </div>
    <div id="results"></div>
  </main>
</div>

<footer class="site">
  Cognio Driver Library · drivers are provided as <code>.cogdriver</code> files.
</footer>

<script>
(function () {
  "use strict";

  // Facets shown as checkbox groups. `key` is the driver field; `label` the
  // group heading. Manufacturer + Category + Validation mirror the Symetrix
  // Control Library's three-facet sidebar.
  var FACETS = [
    { id: "brand",    key: "brand",    label: "Manufacturer" },
    { id: "category", key: "category", label: "Category" },
    { id: "tested",   key: "tested",   label: "Validation" }
  ];

  // Friendly labels for the `tested` values.
  var TESTED_LABEL = {
    "untested": "Untested",
    "hardware": "Hardware tested",
    "3rd party": "3rd-party validated"
  };

  var state = {
    all: [],                                   // every driver from index.json
    search: "",
    selected: { brand: new Set(), category: new Set(), tested: new Set() }
  };

  var elFilters = document.getElementById("filters");
  var elResults = document.getElementById("results");
  var elCount = document.getElementById("count");
  var elSearch = document.getElementById("search");
  var elClear = document.getElementById("clearAll");

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // ---- data load ----
  fetch("./index.json", { cache: "no-cache" })
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function (data) {
      state.all = Array.isArray(data && data.drivers) ? data.drivers : [];
      buildFilters();
      render();
    })
    .catch(function () {
      // A missing index.json (before the first release) is an expected state,
      // not an error — show the friendly empty message.
      state.all = [];
      buildFilters();
      render();
    });

  // ---- filters ----
  function optionsFor(key) {
    var counts = {};
    state.all.forEach(function (d) {
      var v = d[key];
      if (v == null || v === "") return;
      counts[v] = (counts[v] || 0) + 1;
    });
    return Object.keys(counts).sort(function (a, b) {
      return a.localeCompare(b);
    }).map(function (v) { return { value: v, count: counts[v] }; });
  }

  function buildFilters() {
    elFilters.innerHTML = "";
    FACETS.forEach(function (facet) {
      var opts = optionsFor(facet.key);
      if (!opts.length) return; // hide a facet with no data yet
      var group = document.createElement("div");
      group.className = "filter-group";
      var h = document.createElement("h2");
      h.textContent = facet.label;
      group.appendChild(h);

      var list = document.createElement("div");
      list.className = "filter-list";

      // "All" pseudo-option: checked when nothing specific is selected.
      list.appendChild(makeRow(facet, null, "All", state.all.length));
      opts.forEach(function (o) {
        var display = facet.key === "tested" ? (TESTED_LABEL[o.value] || o.value) : o.value;
        list.appendChild(makeRow(facet, o.value, display, o.count));
      });
      group.appendChild(list);
      elFilters.appendChild(group);
    });
  }

  function makeRow(facet, value, display, count) {
    var label = document.createElement("label");
    var cb = document.createElement("input");
    cb.type = "checkbox";
    var set = state.selected[facet.id];
    cb.checked = value === null ? set.size === 0 : set.has(value);
    cb.addEventListener("change", function () {
      if (value === null) {
        set.clear();                 // "All" resets the group
      } else if (cb.checked) {
        set.add(value);
      } else {
        set.delete(value);
      }
      buildFilters();                // re-sync checkbox states (incl. "All")
      render();
    });
    var span = document.createElement("span");
    span.textContent = display;
    var c = document.createElement("span");
    c.className = "count";
    c.textContent = count;
    label.appendChild(cb);
    label.appendChild(span);
    label.appendChild(c);
    return label;
  }

  // ---- rendering ----
  function matches(d) {
    for (var i = 0; i < FACETS.length; i++) {
      var f = FACETS[i];
      var set = state.selected[f.id];
      if (set.size && !set.has(d[f.key])) return false;   // AND across groups
    }
    if (state.search) {
      var hay = (d.brand + " " + d.product + " " + (d.description || "")).toLowerCase();
      if (hay.indexOf(state.search) === -1) return false;
    }
    return true;
  }

  function anyFilterActive() {
    return state.search !== "" ||
      FACETS.some(function (f) { return state.selected[f.id].size > 0; });
  }

  function render() {
    elClear.hidden = !anyFilterActive();

    if (!state.all.length) {
      elResults.innerHTML = '<div class="empty">No drivers are available yet — ' +
        'new drivers are published here as they are released. Check back soon.</div>';
      elCount.textContent = "";
      return;
    }

    var list = state.all.filter(matches);
    elCount.textContent = list.length + (list.length === 1 ? " driver" : " drivers");

    if (!list.length) {
      elResults.innerHTML = '<div class="empty">No drivers match your filters.</div>';
      return;
    }
    elResults.innerHTML = list.map(cardHtml).join("");
  }

  function cardHtml(d) {
    var fileName = String(d.path || d.downloadUrl || "").split("/").pop() || "driver.cogdriver";
    var testedClass = d.tested === "hardware" ? "tested-hardware"
      : d.tested === "3rd party" ? "tested-3rd" : "tested-untested";
    var testedText = TESTED_LABEL[d.tested] || d.tested || "Untested";

    var others = (Array.isArray(d.otherSupportedProducts) && d.otherSupportedProducts.length)
      ? '<div class="others">Also supports: ' + esc(d.otherSupportedProducts.join(", ")) + '</div>'
      : "";

    var dl = d.downloadUrl
      ? '<a class="dl" href="' + esc(d.downloadUrl) + '" download="' + esc(fileName) +
        '" rel="noopener">Download</a>'
      : "";

    return '<article class="card">' +
      '<h3 class="title">' + esc(d.product || "Unnamed driver") + '</h3>' +
      '<p class="brand">' + esc(d.brand || "") + '</p>' +
      '<div class="badges">' +
        (d.category ? '<span class="badge cat">' + esc(d.category) + '</span>' : "") +
        (d.version ? '<span class="badge ver">v' + esc(d.version) + '</span>' : "") +
        '<span class="badge ' + testedClass + '">' + esc(testedText) + '</span>' +
      '</div>' +
      (d.description ? '<p class="desc">' + esc(d.description) + '</p>' : "") +
      others +
      dl +
    '</article>';
  }

  elSearch.addEventListener("input", function () {
    state.search = elSearch.value.trim().toLowerCase();
    render();
  });

  elClear.addEventListener("click", function () {
    state.search = "";
    elSearch.value = "";
    FACETS.forEach(function (f) { state.selected[f.id].clear(); });
    buildFilters();
    render();
  });
})();
</script>
